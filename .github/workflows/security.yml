name: security

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Scan the full history for committed secrets. Works on private repos.
  gitleaks:
    name: gitleaks · secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flags dependencies with known advisories in a PR. Needs the dependency
  # graph (public repo or GHAS), so it's skipped while private.
  dependency-review:
    name: dependency-review
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
