name: codeql

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    name: analyze · ${{ matrix.language }}
    # CodeQL code scanning is free on public repos; on private repos it needs
    # GitHub Advanced Security. Skip while private so CI stays green — this
    # turns on automatically once the repo is made public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
